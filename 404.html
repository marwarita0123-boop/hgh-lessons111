<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة غير موجودة - hgh-lessons111</title>
    <link rel="icon" type="image/png" href="assets/icon-96x96.png">
    <style>
        :root {
            --bg: #fdfaf3;
            --text: #1a1a1a;
            --accent: #8b6914;
        }
        [data-theme="dark"] {
            --bg: #1a1a1f;
            --text: #e0ddd5;
            --accent: #d4a843;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI','Amiri','Noto Naskh Arabic',Tahoma,sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            direction: rtl;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            border: 1px solid var(--accent);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        a:hover {
            background-color: var(--accent);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>عذراً، الصفحة التي تبحث عنها غير موجودة.</p>
        <a href="/">العودة إلى الرئيسية</a>
    </div>
</body>
</html>
